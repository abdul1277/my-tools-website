{% extends "base.html" %}

{% block content %}
<h2>Protect PDF</h2>
<form method="POST" enctype="multipart/form-data">
    <input type="file" name="pdf_file" required>
    <br><br>
    <input type="password" name="password" placeholder="Password" required>
    <br><br>
    <button type="submit">Protect</button>
</form>
{% endblock %}
