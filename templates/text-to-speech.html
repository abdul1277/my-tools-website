{% extends "base.html" %}

{% block meta %}
<meta name="description" content="Free text to speech - Convert any text to audio MP3 file online!">
<meta name="keywords" content="text to speech, text to audio, tts free online">
<title>Text to Speech - SmartToolsHub</title>
{% endblock %}

{% block content %}
<h2>Text to Speech</h2>
<form method="POST">
    <textarea name="text" rows="5" cols="60" placeholder="Enter text here..." required></textarea>
    <br><br>
    <button type="submit">Generate Audio</button>
</form>
{% endblock %}
