{% extends "base.html" %}

{% block meta %}
<meta name="description" content="Free video to MP3 converter - Extract audio from any video file online!">
<meta name="keywords" content="video to mp3, extract audio from video, mp3 converter free">
<title>Video to MP3 Converter - SmartToolsHub</title>
{% endblock %}

{% block content %}
<h1>Video to MP3 Converter</h1>
<p>Convert video files to MP3 audio format.</p>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="video_file" accept="video/*" required>
    <button type="submit">Convert to MP3</button>
</form>
{% endblock %}
