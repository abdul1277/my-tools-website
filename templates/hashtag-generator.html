{% extends "base.html" %}

{% block content %}
<h2>Keyword / Hashtag Generator</h2>
<form method="POST">
    <textarea name="text" rows="5" cols="60" placeholder="Enter text for hashtags..." required></textarea>
    <br><br>
    <button type="submit">Generate</button>
</form>
{% if hashtags %}
    <h3>Hashtags:</h3>
    <p>{{ hashtags | join(' ') }}</p>
{% endif %}
{% endblock %}
