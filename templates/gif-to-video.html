{% extends "base.html" %}

{% block content %}
<h2>Convert GIF to Video</h2>
<form method="POST" enctype="multipart/form-data">
    <input type="file" name="gif_file" required>
    <br><br>
    <button type="submit">Convert</button>
</form>
<p>Converted MP4 will be downloaded.</p>
{% endblock %}
