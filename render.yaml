services:
  - type: web
    name: smarttoolshub
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg poppler-utils libgl1 libglib2.0-0
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --keep-alive 300
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
